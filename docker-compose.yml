services:
  blazelist:
    build: .
    ports:
      # - "127.0.0.1:47200:47200/udp" # QUIC — uncomment for native clients or the dev-seeder
      - "127.0.0.1:47400:47400/udp"   # WebTransport (browser clients)
      - "127.0.0.1:47600:47600"       # HTTP cert-hash endpoint
      - "127.0.0.1:47800:47800"       # WASM client (HTTPS)
    volumes:
      - blazelist-data:/data
    environment:
      # When the server detects a database created by a different major
      # protocol version (i.e. a breaking schema change), it will refuse
      # to start unless this variable is set to "true".
      BLAZELIST_ALLOW_IRREVERSIBLE_AUTOMATIC_UPGRADE_MIGRATION: "false"
    command: ["--db", "/data/blazelist.db"]

volumes:
  blazelist-data:
