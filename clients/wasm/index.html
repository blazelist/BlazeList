<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BlazeList</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link data-trunk rel="css" href="style/variables.css" />
    <link data-trunk rel="css" href="style/base.css" />
    <link data-trunk rel="css" href="style/layout.css" />
    <link data-trunk rel="css" href="style/sidebar.css" />
    <link data-trunk rel="css" href="style/filter.css" />
    <link data-trunk rel="css" href="style/cards.css" />
    <link data-trunk rel="css" href="style/detail.css" />
    <link data-trunk rel="css" href="style/editor.css" />
    <link data-trunk rel="css" href="style/tags.css" />
    <link data-trunk rel="css" href="style/history.css" />
    <link data-trunk rel="css" href="style/connect.css" />
    <link data-trunk rel="css" href="style/keyboard.css" />
    <link data-trunk rel="css" href="style/responsive.css" />
    <link data-trunk rel="copy-file" href="public/favicon.png" />
    <link data-trunk rel="copy-file" href="public/apple-touch-icon.png" />
    <link data-trunk rel="copy-file" href="public/icon-192.png" />
    <link data-trunk rel="copy-file" href="public/icon-512.png" />
    <link data-trunk rel="copy-file" href="public/manifest.webmanifest" />
    <link data-trunk rel="copy-file" href="public/sw.js" />
    <meta name="theme-color" content="#0c0c0f" />
</head>
<body style="margin:0;">
    <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;background:#0a0a0d;color:#888890;font-family:system-ui,sans-serif;">
        <h1 style="font-size:1.2rem;font-weight:600;color:#d0d0d4;margin-bottom:0.5rem;">BlazeList</h1>
        <p style="font-size:0.75rem;" id="loading-text">Loading&hellip;</p>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
        // If WASM hasn't mounted after 10 seconds, it likely failed to load.
        setTimeout(function() {
            var el = document.getElementById('loading-text');
            if (el) el.textContent = 'Could not load. Please check your connection and try again.';
        }, 10000);
    </script>
</body>
</html>
